<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쿵쿵따 게임</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .menu {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-direction: column;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f093fb;
            color: white;
        }

        .btn-secondary:hover {
            background: #dd82f1;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(240, 147, 251, 0.4);
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .game-section {
            display: none;
        }

        .game-section.active {
            display: block;
        }

        .game-info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-weight: bold;
            color: #555;
        }

        .info-value {
            color: #667eea;
            font-weight: bold;
        }

        .current-word {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 2.5em;
            font-weight: bold;
            letter-spacing: 10px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .game-log {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .log-entry {
            padding: 8px;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-player {
            color: #667eea;
            font-weight: bold;
        }

        .log-ai {
            color: #f093fb;
            font-weight: bold;
        }

        .log-error {
            color: #ff6b6b;
            font-weight: bold;
        }

        .log-success {
            color: #51cf66;
            font-weight: bold;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .message-error {
            background: #ffe0e0;
            color: #d32f2f;
            border: 1px solid #ffb3ba;
        }

        .message-success {
            background: #e8f5e9;
            color: #388e3c;
            border: 1px solid #c8e6c9;
        }

        .message-info {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }

        .game-over {
            text-align: center;
        }

        .game-over-title {
            font-size: 2em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .game-over-result {
            font-size: 1.3em;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .result-player {
            color: #667eea;
        }

        .result-ai {
            color: #f093fb;
        }

        .result-draw {
            color: #ffa726;
        }

        .stats {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        /* 스크롤바 스타일 */
        .game-log::-webkit-scrollbar {
            width: 8px;
        }

        .game-log::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .game-log::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .game-log::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 쿵쿵따</h1>

        <!-- 메뉴 화면 -->
        <div id="menuSection" class="game-section active">
            <div style="text-align: center; margin-top: 40px;">
                <p style="font-size: 1.2em; color: #666; margin-bottom: 40px;">플레이어 vs AI와 함께하는 3글자 끝말잇기 게임</p>
                <div class="menu">
                    <button class="btn btn-primary" onclick="startGame()">게임 시작</button>
                </div>
                <div style="margin-top: 40px; padding: 20px; background: #f5f5f5; border-radius: 10px; text-align: left; font-size: 0.95em; color: #666;">
                    <p style="margin-bottom: 10px;"><strong>게임 규칙:</strong></p>
                    <ul style="margin-left: 20px; line-height: 1.8;">
                        <li>3글자 단어만 사용할 수 있습니다</li>
                        <li>이전 단어의 마지막 글자로 시작하는 단어를 입력해야 합니다</li>
                        <li>이미 사용한 단어는 다시 사용할 수 없습니다</li>
                        <li>유효한 단어를 입력하지 못하면 패배합니다</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 게임 화면 -->
        <div id="gameSection" class="game-section">
            <div class="game-info">
                <div class="info-row">
                    <span class="info-label">플레이어</span>
                    <span class="info-value" id="playerScore">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">AI</span>
                    <span class="info-value" id="aiScore">0</span>
                </div>
                <div class="info-row">
                    <span class="info-label">턴</span>
                    <span class="info-value" id="turnInfo">플레이어</span>
                </div>
            </div>

            <div id="message"></div>

            <div class="current-word" id="currentWord">시작</div>

            <div class="input-group">
                <input type="text" id="wordInput" placeholder="3글자 단어를 입력하세요" onkeypress="handleKeyPress(event)">
                <button class="btn btn-primary" onclick="submitWord()">제출</button>
            </div>

            <div class="game-log" id="gameLog"></div>

            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="giveUp()">포기</button>
                <button class="btn btn-danger" style="flex: 1;" onclick="goToMenu()">메뉴</button>
            </div>
        </div>

        <!-- 게임 오버 화면 -->
        <div id="gameOverSection" class="game-section">
            <div class="game-over">
                <div id="gameOverTitle" class="game-over-title"></div>
                <div id="gameOverResult" class="game-over-result"></div>
                
                <div class="stats">
                    <div class="stat-item">
                        <span>게임 라운드:</span>
                        <span id="finalRound">0</span>
                    </div>
                    <div class="stat-item">
                        <span>플레이어 점수:</span>
                        <span id="finalPlayerScore">0</span>
                    </div>
                    <div class="stat-item">
                        <span>AI 점수:</span>
                        <span id="finalAiScore">0</span>
                    </div>
                    <div class="stat-item">
                        <span>사용된 단어:</span>
                        <span id="finalWordCount">0</span>
                    </div>
                </div>

                <div class="menu">
                    <button class="btn btn-primary" onclick="startGame()">다시 게임</button>
                    <button class="btn btn-secondary" onclick="goToMenu()">메뉴</button>
                </div>
            </div>
        </div>
    </div>

            setTimeout(() => {
                aiTurn();
            }, 1000);
        }

        // ==================== AI 턴 ====================
        function aiTurn() {
            if (!gameState.gameActive) return;

            const lastChar = gameState.currentWord[gameState.currentWord.length - 1];
            const possibleWords = WORD_LIST.filter(w => 
                w[0] === lastChar && !gameState.usedWords.includes(w)
            );

            if (possibleWords.length === 0) {
                // AI 패배
                endGame(true);
                return;
            }

            // AI가 단어 선택 (한방단어 제외 - 플레이어가 다음 단어를 낼 수 있도록)
            let validWords = possibleWords.filter(w => {
                const nextChar = w[w.length - 1];
                const nextPossibleWords = WORD_LIST.filter(word => 
                    word[0] === nextChar && !gameState.usedWords.includes(word) && word !== w
                );
                return nextPossibleWords.length > 0;
            });

            // 한방단어만 남아있으면 AI 패배
            if (validWords.length === 0) {
                endGame(true);
                return;
            }

            const aiWord = validWords[Math.floor(Math.random() * validWords.length)];
            gameState.currentWord = aiWord;
            gameState.usedWords.push(aiWord);
            gameState.aiScore++;
            addLog(`<span class="log-ai">AI</span>: ${aiWord}`);

            gameState.isPlayerTurn = true;
            updateUI();
            document.getElementById('wordInput').focus();
        }

        // ==================== 게임 종료 ====================
        function endGame(playerWon) {
            gameState.gameActive = false;

            if (playerWon) {
                addLog('<span class="log-success">🎉 플레이어 승리!</span>');
            } else {
                addLog('<span class="log-error">💥 AI 승리!</span>');
            }

            setTimeout(() => {
                showGameOverScreen(playerWon);
            }, 1000);
        }

        // ==================== 게임 오버 화면 ====================
        function showGameOverScreen(playerWon) {
            document.getElementById('gameSection').classList.remove('active');
            document.getElementById('gameOverSection').classList.add('active');

            const finalTitle = playerWon ? '🎉 승리!' : '😔 패배';
            const finalResult = playerWon ? 
                '축하합니다! 플레이어가 이겼습니다!' : 
                'AI가 유효한 단어를 찾지 못했습니다. 플레이어 승리!';

            document.getElementById('gameOverTitle').textContent = finalTitle;
            document.getElementById('gameOverResult').innerHTML = 
                `<span class="${playerWon ? 'result-player' : 'result-ai'}">${finalResult}</span>`;
            
            document.getElementById('finalRound').textContent = gameState.round + 1;
            document.getElementById('finalPlayerScore').textContent = gameState.playerScore;
            document.getElementById('finalAiScore').textContent = gameState.aiScore;
            document.getElementById('finalWordCount').textContent = gameState.usedWords.length;
        }

        // ==================== 포기 ====================
        function giveUp() {
            if (confirm('정말 포기하시겠습니까?')) {
                gameState.gameActive = false;
                addLog('<span class="log-error">플레이어가 포기했습니다. AI 승리!</span>');
                setTimeout(() => {
                    showGameOverScreen(false);
                }, 500);
            }
        }

        // ==================== 메뉴로 이동 ====================
        function goToMenu() {
            gameState.gameActive = false;
            document.getElementById('menuSection').classList.add('active');
            document.getElementById('gameSection').classList.remove('active');
            document.getElementById('gameOverSection').classList.remove('active');
            clearMessage();
        }

        // ==================== UI 업데이트 ====================
        function updateUI() {
            document.getElementById('currentWord').textContent = gameState.currentWord || '시작';
            document.getElementById('playerScore').textContent = gameState.playerScore;
            document.getElementById('aiScore').textContent = gameState.aiScore;
            document.getElementById('turnInfo').textContent = gameState.isPlayerTurn ? '플레이어' : 'AI';
            document.getElementById('wordInput').disabled = !gameState.isPlayerTurn || !gameState.gameActive;
        }

        // ==================== 메시지 표시 ====================
        function showMessage(text, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = text;
            messageDiv.className = `message message-${type}`;
        }

        function clearMessage() {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = '';
            messageDiv.className = '';
        }

        // ==================== 게임 로그 ====================
        function addLog(text) {
            const logDiv = document.getElementById('gameLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = text;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // ==================== 키보드 입력 ====================
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitWord();
            }
        }

        // ==================== 초기화 ====================
        window.addEventListener('load', () => {
            // 초기 로드 시 실행
        });
    </script>
</body>
</html>
